version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: personalfinanceanalyzer_db
    environment:
      POSTGRES_DB: personalfinanceanalyzer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: personalfinanceanalyzer_app
    ports:
      - "8501:8501"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/personalfinanceanalyzer
      - SENTRY_DSN=${SENTRY_DSN:-}
    volumes:
      - .:/app
      - /app/__pycache__
    depends_on:
      db:
        condition: service_healthy
    command: streamlit run src/app.py --server.port=8501 --server.address=0.0.0.0
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
        - action: sync
          path: ./tests
          target: /app/tests

volumes:
  postgres_data: