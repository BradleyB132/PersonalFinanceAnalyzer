repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-yaml
        files: ^(\.github/workflows/.*\.yml|\.github/dependabot\.yml)$
      - id: check-toml
        files: ^pyproject\.toml$
      - id: end-of-file-fixer
        files: ^(main\.py|app/.*\.py|views/.*\.py|src/services/.*\.py|src/db\.py|tests/.*\.py|\.github/.*\.yml|pyproject\.toml|\.pre-commit-config\.yaml)$
      - id: trailing-whitespace
        files: ^(main\.py|app/.*\.py|views/.*\.py|src/services/.*\.py|src/db\.py|tests/.*\.py|\.github/.*\.yml|pyproject\.toml|\.pre-commit-config\.yaml)$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.0
    hooks:
      - id: ruff-format
        files: ^(main\.py|app/.*\.py|views/.*\.py|src/services/.*\.py|src/db\.py|tests/.*\.py)$
      - id: ruff
        args: [--fix]
        files: ^(main\.py|app/.*\.py|views/.*\.py|src/services/.*\.py|src/db\.py|tests/.*\.py)$

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.2
    hooks:
      - id: mypy
        args: [--config-file=pyproject.toml]
        files: ^(main\.py|app/.*\.py|views/.*\.py|src/services/.*\.py|src/db\.py)$
        additional_dependencies: []
